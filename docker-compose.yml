version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cacafly_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: cacafly_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: cacafly_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cacafly_interview
    ports:
      - "3307:3306"   # 用 3307 避免跟 XAMPP 的 3306 衝突